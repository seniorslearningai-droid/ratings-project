<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ratings Project</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: #FF8C00;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 3rem 1.25rem 3rem;
    color: #fff;
    gap: 2rem;
  }
  h1 {
    font-family: 'Fredoka', sans-serif;
    font-size: 2.8rem;
    font-weight: 700;
    text-align: center;
    text-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }

  /* ===== MENU ===== */
  .menu-card {
    background: rgba(255,255,255,0.15);
    border: 2px solid rgba(255,255,255,0.4);
    border-radius: 20px;
    padding: 1.75rem 2rem;
    width: 100%;
    max-width: 420px;
    backdrop-filter: blur(4px);
  }
  .menu-title {
    font-family: 'Fredoka', sans-serif;
    font-size: 2rem;
    font-weight: 700;
    text-align: center;
    margin-bottom: 1.25rem;
    letter-spacing: .02em;
  }
  .menu-section-title {
    font-family: 'Fredoka', sans-serif;
    font-size: 1.2rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .08em;
    margin-bottom: .75rem;
    opacity: .85;
    border-bottom: 1px solid rgba(255,255,255,0.35);
    padding-bottom: .4rem;
  }
  .menu-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: .55rem 0;
    font-size: 1.05rem;
    font-weight: 600;
    border-bottom: 1px solid rgba(255,255,255,0.15);
  }
  .menu-item:last-child { border-bottom: none; }
  .menu-item .price {
    font-family: 'Fredoka', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
  }

  /* ===== BUTTON ===== */
  .rate-btn {
    background: #fff;
    color: #FF8C00;
    border: none;
    border-radius: 999px;
    padding: 1rem 3.5rem;
    font-family: 'Fredoka', sans-serif;
    font-size: 1.5rem;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 6px 24px rgba(0,0,0,0.2);
    transition: transform .12s, box-shadow .12s;
    text-decoration: none;
    display: inline-block;
  }
  .rate-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 32px rgba(0,0,0,0.28); }
  .rate-btn:active { transform: translateY(0); }
</style>
</head>
<body>
  <h1>Cool Off Spa</h1>

  <div class="menu-card">
    <div class="menu-title">Menu</div>
    <div class="menu-section-title">Spa / Massage</div>
    <div class="menu-item">
      <span>5 min</span>
      <span class="price">$1.00 USD</span>
    </div>
    <div class="menu-item">
      <span>10 min</span>
      <span class="price">$42.00 USD</span>
    </div>
    <div class="menu-item">
      <span>15 min</span>
      <span class="price">$2.50 USD</span>
    </div>
    <div class="menu-section-title" style="margin-top:1.25rem">Special Surprise Treatment</div>
    <div class="menu-item">
      <span>5 min</span>
      <span class="price">$1.00 USD</span>
    </div>
    <div class="menu-item">
      <span>10 min</span>
      <span class="price">$42.00 USD</span>
    </div>
    <div class="menu-item">
      <span>15 min</span>
      <span class="price">$2.50 USD</span>
    </div>
  </div>

  <a href="reviews.html" class="rate-btn">Rate Us!</a>
</body>
</html>
