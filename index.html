<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ratings Project</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: #FF8C00;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 3rem 1.25rem 3rem;
    color: #fff;
    gap: 2rem;
  }
  h1 {
    font-family: 'Fredoka', sans-serif;
    font-size: 2.8rem;
    font-weight: 700;
    text-align: center;
    text-shadow: 0 2px 8px rgba(0,0,0,0.15);
    position: relative;
    z-index: 1;
  }

  /* ===== MENU ===== */
  .menu-card {
    position: relative;
    z-index: 1;
    background: rgba(255,255,255,0.15);
    border: 2px solid rgba(255,255,255,0.4);
    border-radius: 20px;
    padding: 1.75rem 2rem;
    width: 100%;
    max-width: 420px;
    backdrop-filter: blur(4px);
  }
  .menu-title {
    font-family: 'Fredoka', sans-serif;
    font-size: 2rem;
    font-weight: 700;
    text-align: center;
    margin-bottom: 1.25rem;
    letter-spacing: .02em;
  }
  .menu-section-title {
    font-family: 'Fredoka', sans-serif;
    font-size: 1.2rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .08em;
    margin-bottom: .75rem;
    opacity: .85;
    border-bottom: 1px solid rgba(255,255,255,0.35);
    padding-bottom: .4rem;
  }
  .menu-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: .55rem 0;
    font-size: 1.05rem;
    font-weight: 600;
    border-bottom: 1px solid rgba(255,255,255,0.15);
  }
  .menu-item:last-child { border-bottom: none; }
  .menu-item .price {
    font-family: 'Fredoka', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
  }

  /* ===== BUTTON ===== */
  .rate-btn {
    position: relative;
    z-index: 1;
    background: #fff;
    color: #FF8C00;
    border: none;
    border-radius: 999px;
    padding: 1rem 3.5rem;
    font-family: 'Fredoka', sans-serif;
    font-size: 1.5rem;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 6px 24px rgba(0,0,0,0.2);
    transition: transform .12s, box-shadow .12s;
    text-decoration: none;
    display: inline-block;
  }
  .rate-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 32px rgba(0,0,0,0.28); }
  .rate-btn:active { transform: translateY(0); }

  /* ===== ICICLES ===== */
  .icicle-row {
    position: fixed;
    display: flex;
    align-items: flex-start;
    pointer-events: none;
    z-index: 0;
  }
  .icicle-row.top    { top: 0; left: 0; right: 0; flex-direction: row; justify-content: space-around; }
  .icicle-row.bottom { bottom: 0; left: 0; right: 0; flex-direction: row; justify-content: space-around; align-items: flex-end; transform: rotate(180deg); }
  .icicle-row.left   { top: 0; left: 0; bottom: 0; flex-direction: column; justify-content: space-around; align-items: flex-start; writing-mode: vertical-lr; }
  .icicle-row.right  { top: 0; right: 0; bottom: 0; flex-direction: column; justify-content: space-around; align-items: flex-end; transform: rotate(180deg); }
  .icicle {
    display: inline-block;
    width: var(--w, 14px);
    height: var(--h, 55px);
    background: linear-gradient(to bottom, rgba(255,255,255,0.98) 0%, rgba(210,245,255,0.92) 60%, rgba(180,235,255,0.75) 100%);
    border-radius: 0 0 40% 40%;
    position: relative;
    box-shadow: inset 3px 0 5px rgba(255,255,255,0.6), 2px 0 8px rgba(180,235,255,0.3);
    flex-shrink: 0;
  }
  .icicle::after {
    content: '';
    position: absolute;
    bottom: calc(-1 * var(--w, 14px) * 0.6);
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: calc(var(--w, 14px) / 2) solid transparent;
    border-right: calc(var(--w, 14px) / 2) solid transparent;
    border-top: calc(var(--w, 14px) * 0.65) solid rgba(180,235,255,0.78);
  }
  .icicle-row.left  .icicle,
  .icicle-row.right .icicle { width: var(--h, 55px); height: var(--w, 14px); border-radius: 0 40% 40% 0; }
  .icicle-row.left  .icicle::after,
  .icicle-row.right .icicle::after {
    bottom: auto; left: auto;
    right: calc(-1 * var(--w, 14px) * 0.6);
    top: 50%; transform: translateY(-50%);
    border-top: calc(var(--w, 14px) / 2) solid transparent;
    border-bottom: calc(var(--w, 14px) / 2) solid transparent;
    border-left: calc(var(--w, 14px) * 0.65) solid rgba(180,235,255,0.78);
    border-right: none;
  }
  @keyframes drip {
    0%   { transform: scaleY(1); }
    90%  { transform: scaleY(1); }
    95%  { transform: scaleY(1.08); }
    100% { transform: scaleY(1); }
  }
  .icicle { animation: drip calc(var(--d, 4s)) ease-in-out infinite; transform-origin: top center; }
</style>
</head>
<body>
  <h1>Cool Off Spa</h1>

  <div class="menu-card">
    <div class="menu-title">Menu</div>
    <div class="menu-section-title">Spa / Massage</div>
    <div class="menu-item">
      <span>5 min</span>
      <span class="price">$1.00 USD</span>
    </div>
    <div class="menu-item">
      <span>10 min</span>
      <span class="price">$2.00 USD</span>
    </div>
    <div class="menu-item">
      <span>15 min</span>
      <span class="price">$2.50 USD</span>
    </div>
    <div class="menu-section-title" style="margin-top:1.25rem">Special Surprise Treatment</div>
    <div class="menu-item">
      <span>5 min</span>
      <span class="price">$1.00 USD</span>
    </div>
    <div class="menu-item">
      <span>10 min</span>
      <span class="price">$2.00 USD</span>
    </div>
    <div class="menu-item">
      <span>15 min</span>
      <span class="price">$2.50 USD</span>
    </div>
  </div>

  <a href="reviews.html" class="rate-btn">Rate Us!</a>

  <div class="icicle-row top"    id="iceTop"></div>
  <div class="icicle-row bottom" id="iceBot"></div>
  <div class="icicle-row left"   id="iceLeft"></div>
  <div class="icicle-row right"  id="iceRight"></div>

  <script>
    function makeIcicles(id, count, horizontal) {
      var row = document.getElementById(id);
      for (var i = 0; i < count; i++) {
        var el = document.createElement('div');
        el.className = 'icicle';
        var w = 10 + Math.floor(Math.random() * 14);
        var h = 35 + Math.floor(Math.random() * 65);
        var d = (3 + Math.random() * 5).toFixed(1);
        el.style.cssText = '--w:' + w + 'px;--h:' + h + 'px;--d:' + d + 's;';
        row.appendChild(el);
      }
    }
    makeIcicles('iceTop',   22, true);
    makeIcicles('iceBot',   22, true);
    makeIcicles('iceLeft',  10, false);
    makeIcicles('iceRight', 10, false);
  </script>
</body>
</html>
