<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ratings Project</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: #FF8C00;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 3rem 1.25rem 3rem;
    color: #fff;
  }
  h1 {
    font-family: 'Fredoka', sans-serif;
    font-size: 2.8rem;
    font-weight: 700;
    text-align: center;
    text-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  .rate-btn {
    background: #fff;
    color: #FF8C00;
    border: none;
    border-radius: 999px;
    padding: 1rem 3.5rem;
    font-family: 'Fredoka', sans-serif;
    font-size: 1.5rem;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 6px 24px rgba(0,0,0,0.2);
    transition: transform .12s, box-shadow .12s;
    text-decoration: none;
    display: inline-block;
  }
  .rate-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 32px rgba(0,0,0,0.28); }
  .rate-btn:active { transform: translateY(0); }
</style>
</head>
<body>
  <h1>⭐ Ratings Project</h1>
  <a href="reviews.html" class="rate-btn">Rate Us!</a>
</body>
</html>
